<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This must be the very first script to run
      (function() {
        try {
          var originalFetch = window.fetch;
          
          // 1. Try to delete from instance and prototype first
          try { delete window.fetch; } catch(e) {}
          try { delete Window.prototype.fetch; } catch(e) {}

          // 2. Define accessor property on window instance
          // This shadows the prototype property and allows assignment via the setter
          var _currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return _currentFetch; },
            set: function(v) { _currentFetch = v; },
            configurable: true,
            enumerable: true
          });
          
          // 3. Also patch globalThis
          if (typeof globalThis !== 'undefined' && globalThis !== window) {
             try {
               Object.defineProperty(globalThis, 'fetch', {
                  get: function() { return _currentFetch; },
                  set: function(v) { _currentFetch = v; },
                  configurable: true,
                  enumerable: true
               });
             } catch(e) {}
          }
          
          console.log('Patched window.fetch with accessor');
        } catch (e) {
          console.error('Failed to patch fetch:', e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

    <style>
      /* Ensure full height on mobile */
      html, body, #root {
        height: 100%;
        min-height: 100dvh;
      }

      /* Desktop: Mặc định 16px */
      @media (min-width: 1024px) {
        html {
          font-size: 16px !important;
        }
      }

      /* Mobile: Allow font scaling but ensure readability */
      @media (max-width: 1023px) {
        html { font-size: 14px; }
      }

      /* Custom scrollbar for table */
      .custom-scrollbar::-webkit-scrollbar {
        height: 6px; /* Dày hơn xíu trên mobile để dễ ấn */
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      /* Dark mode scrollbar */
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
      }

      /* Marquee Animation */
      @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      .animate-marquee {
        display: inline-block;
        white-space: nowrap;
        animation: marquee 25s linear infinite;
      }
      .animate-marquee:hover {
        animation-play-state: paused;
      }
      
      /* Chatbot animations */
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up {
        animation: slideInUp 0.3s ease-out forwards;
      }
    </style>
